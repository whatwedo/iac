---
driver:
  name: podman
platforms:
  - name: iac-test-debian
    image: ghcr.io/whatwedo/iac-test-debian:13
    pre_build_image: true
    command: "/usr/lib/systemd/systemd"
    systemd: always
provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: "../../roles"
  # Reuse the shared `test` inventory instead of inlining vars here, so the role
  # is exercised against the same groups/host_vars a real run would use. The
  # platform name above matches its host, so that host's vars/groups apply.
  inventory:
    links:
      hosts: ../../inventories/test/hosts
      group_vars: ../../inventories/test/group_vars/
      host_vars: ../../inventories/test/host_vars/
verifier:
  name: testinfra
