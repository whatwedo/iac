---
driver:
  name: podman
platforms:
  - name: iac-test-debian
    image: ghcr.io/whatwedo/iac-test-debian:13
    pre_build_image: true
    command: "/usr/lib/systemd/systemd"
    systemd: always
provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: "../../roles"
  inventory:
    group_vars:
      all:
        ansible_user: test-admin
verifier:
  name: testinfra
