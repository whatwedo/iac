---
driver:
  name: podman
platforms:
  - name: iac-test-debian
    # Systemd-enabled image so we can assert the ssh service is actually running.
    image: ghcr.io/whatwedo/iac-test-debian:13
    pre_build_image: true
    command: /usr/lib/systemd/systemd
    systemd: always
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
provisioner:
  name: ansible
  env:
    # Scenario lives at ansible/molecule/sshd -> role lives at ansible/roles.
    ANSIBLE_ROLES_PATH: "../../roles"
verifier:
  name: testinfra
