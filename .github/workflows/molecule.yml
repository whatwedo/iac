name: Molecule

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read

defaults:
  run:
    working-directory: ansible

jobs:
  molecule:
    runs-on: ubuntu-latest
    # Run every step inside the iac-shell image so CI uses the exact same
    # Ansible/Molecule/collection versions as local development (`wwd`).
    container:
      image: ghcr.io/whatwedo/iac-shell:latest
      # Molecule's podman driver starts test containers *inside* this job
      # container (podman-in-podman), so we need --privileged (nested
      # containers + systemd). Running as root avoids workspace ownership
      # clashes: hosted runners own the checkout as UID 1001, the image's
      # default user is UID 1000.
      options: --privileged --user root
    strategy:
      fail-fast: false
      matrix:
        # Add a role's scenario name here when you create molecule/<role>/.
        scenario:
          - sshd
    name: molecule (${{ matrix.scenario }})
    env:
      # The image sets CONTAINER_HOST to the local rootless podman socket used
      # by `wwd`; that socket does not exist in CI, so clear it and let podman
      # run natively inside this container.
      CONTAINER_HOST: ""
      PY_COLORS: "1"
      ANSIBLE_FORCE_COLOR: "1"
      # GitHub Actions forces HOME=/github/home for container jobs, but the
      # iac-shell image's user home is /home/wwd-admin. Molecule's podman driver
      # deletes instances with an async shell task followed by an async_status
      # poll; each resolves the default async dir (~/.ansible_async) against a
      # different HOME, so the poll looks in the wrong place ("could not find
      # job") and `destroy` fails with return code 2. Pinning an absolute path
      # removes the ~ expansion so launch and poll always agree. (Locally under
      # `wwd` HOME is consistent, which is why molecule passes there.)
      ANSIBLE_ASYNC_DIR: "/tmp/.ansible_async"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trust the checkout directory for git
        run: git config --global --add safe.directory '*'

      # No tool installation step: ansible, molecule, molecule-plugins[podman]
      # and the containers.podman collection are all baked into iac-shell.
      - name: Run molecule ${{ matrix.scenario }} scenario
        run: molecule test -s ${{ matrix.scenario }}
